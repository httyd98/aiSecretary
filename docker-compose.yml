services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: segretario
      POSTGRES_PASSWORD: segretario
      POSTGRES_DB: segretario_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/001_initial.sql:/docker-entrypoint-initdb.d/001_initial.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U segretario -d segretario_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql://segretario:segretario@db:5432/segretario_db
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
